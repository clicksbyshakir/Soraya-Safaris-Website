name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  astro:
    name: Astro check and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Astro
        run: npm run check

      - name: Build
        run: npm run build
