name: Publish Blog Post

on:
  repository_dispatch:
    types:
      - publish-blog-post

permissions:
  contents: write

concurrency:
  group: publish-blog-post-main
  cancel-in-progress: false

jobs:
  publish-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate payload and write post
        id: publish
        run: node scripts/validate-and-write-blog-post.mjs

      - name: Run Astro check
        run: |
          set -o pipefail
          if ! npm run check 2>&1 | tee astro-check.log; then
            {
              echo "astro check failed. Last 120 log lines:"
              tail -n 120 astro-check.log
            } > publish_failure_reason.txt
            exit 1
          fi

      - name: Build site
        run: |
          set -o pipefail
          if ! npm run build 2>&1 | tee astro-build.log; then
            {
              echo "astro build failed. Last 120 log lines:"
              tail -n 120 astro-build.log
            } > publish_failure_reason.txt
            exit 1
          fi

      - name: Commit and push
        env:
          BLOG_SLUG: ${{ steps.publish.outputs.slug }}
          BLOG_PATH: ${{ steps.publish.outputs.path }}
        run: |
          if [ -z "$(git status --porcelain -- "$BLOG_PATH")" ]; then
            echo "No blog file changes were found to commit." > publish_failure_reason.txt
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$BLOG_PATH"
          git commit -m "blog: publish $BLOG_SLUG"
          git push origin HEAD:main

      - name: Report failure to Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BLOG_SLUG: ${{ steps.publish.outputs.slug || 'unavailable' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-blog-publish-failure.mjs
